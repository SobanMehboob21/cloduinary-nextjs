
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mongo-pv
  labels:
    type: local
    app: cloudinary-next
spec:
  storageClassName: manual      
  capacity:
    storage: 5Gi                
  accessModes:
    - ReadWriteOnce             
  persistentVolumeReclaimPolicy: Retain 
  hostPath:
    path: "/mnt/data/mongo"    
